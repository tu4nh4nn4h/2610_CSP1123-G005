<!DOCTYPE html>
<html>
    <head>
        <title>User Profile - UniSphere</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #fbc2eb, #a18cd1);
                display: flex;
                flex-direction: column;
                padding: 50px;
            }
            .container {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 30px;
                margin-top: 20px;
                margin-left: 40px;
            }
            .profile {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 480px;
                height: 350px;
                margin-bottom: 20px;
            }

            .about {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 480px;
                height: 350px;
                margin-bottom: 20px;
            }
            .profile p {
                margin: 10px 0;
            }
            .profile-actions button {
                padding: 10px 20px;
                margin: 5px;
                background-color: #bb00ff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .profile-actions button:hover {
                background-color: #0056b3;
            }

            img {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                margin-bottom: 20px;
            }
        </style>
    </head>
    
    <body>
        <h1>User Profile</h1>
        <p>Welcome to your profile page!</p>
        <div class="container">
            <div class="profile">
                <h3>Username: <span id="username-value">JohnDoe</span></h3>
                <img src="profile-picture-placeholder.png" alt="Profile Picture" id="profile-picture">
                <p id="name">Name: John Doe</p>
                <p id="bio">Bio: This is a short bio about the user.</p>
            </div>
            <div class="about">
                <p id="faculty">Faculty: Faculty of Science</p>
                <p id="year-of-study">Year of Study: 2</p>
                <p id="email">Email: johndoe@example.com</p>
                <div class="profile-actions">
                    <button a href="EditProfile.html">Edit Profile</button>
                    <button>Log Out</button>
                </div>
            </div>
        </div>
    
    
    </body>
</html>
