<!DOCTYPE html>
<html>
    <head>
        <title>Edit Profile - UniSphere</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #fbc2eb, #a18cd1);
                display: flex;
                flex-direction: column;
                padding: 50px;
            }
            .container {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 30px;
                margin-top: 20px;
                margin-left: 40px;
            }
            .edit-profile {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 480px;
                height: auto;
            }
            .edit-profile label {
                display: block;
                margin-top: 10px;
            }
            .edit-profile input[type="text"],
            .edit-profile input[type="email"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            .edit-profile input[type="submit"] {
                margin-top: 15px;
                padding: 10px;
                width: 100%;
                background-color: #bb00ff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .edit-profile input[type="submit"]:hover {
                background-color: #0056b3;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="edit-profile">
                <h2>Edit Your Profile</h2>
                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" value="John Doe">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" value="JohnDoe">
                    <label for="bio">Bio:</label>
                    <input type="text" id="bio" name="bio" value="Computer Science student at UniSphere.">      
                    <label for="faculty">Faculty:</label>
                    <input type="text" id="faculty" name="faculty" value="Faculty of Science">    
                    <label for="year-of-study">Year of Study:</label>
                    <input type="text" id="year-of-study" name="year-of-study" value="2">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" value="johndoe@example.com">
                    <input type="submit" value="Update Profile">

                </form>
            </div>
        </div>
    </body>
</html>
