<!DOCTYPE html>
<html>
    <head>
        <title>Organizer: Event Creation Form</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='create_event.css') }}">
    </head>

    <body>

        <nav class="navbar">
            <div class="logo">
                <a href="#">UniSphere</a>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('eventbrowsing') }}">Browse Event</a></li>
                <li><a href="{{ url_for('create_event') }}">Create Event - Be an Organizer</a></li>
            </ul>
            <div class="profile">
                <a href="#profile">Profile</a>
            </div>
        </nav>

        <div class="container">
    <div class="form-card">
        <div class="header">
            <h2>Create Event</h2>
            <p id="step-indicator">Step 1 of 2: Basic Details</p>
        </div>

        <form id="createEventForm" onsubmit="handleSubmit(event)">
            <!-- SECTION 1: BASIC DETAILS -->
            <div class="form-step" id="step1">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="name" placeholder="Enter event name" required>
                </div>

                <div class="form-group">
                    <label>Event Description</label>
                    <input id="description" placeholder="Enter event description" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Event Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Event Time</label>
                        <input type="time" id="time" required>
                    </div>
                </div>

                <div class="form-group">
                        <label>Event Location</label>
                        <select id="faculty" onchange="updateSpecificLocations()" required>
                            <option value="">Select location</option>
                            <option value="Central Plaza">Central Plaza</option>
                            <option value="MMU Stadium">MMU Stadium</option>
                            <option value="Surau Al-Hidayah">Surau Al-Hidayah</option>
                            <option value="Tun Dr. Hasmah Mohd Ali Digital Library">Tun Dr. Hasmah Mohd Ali Digital Library</option>
                            <option value="Dewan Tun Canselor">Dewan Tun Canselor</option>
                            <option value="Annex Hall">Annex Hall</option>
                            <option value="CLC">CLC</option>
                            <option value="FCI">FCI</option>
                            <option value="FAIE">FAIE</option>
                            <option value="FOM">FOM</option>
                            <option value="FAC">FAC</option>
                            <option value="FCM">FCM</option>
                            <option value="FCA">FCA</option>
                        </select>
                    </div>
                
                <!-- This will be hidden until a faculty is selected -->
                <div class="form-group" id="specific_location_container" style="display: none;">
                    <label>Specific Room / Venue</label>
                    <select id="specific_location" required>
                        <option value="">Select a specific spot</option>
                    </select>
                </div>

                <button type="button" onclick="nextStep()">Next</button>
            </div>

            <!-- SECTION 2: LOGISTICS & PRICING -->
            <div class="form-step" id="step2" style="display: none;">
                <div class="form-group">
                    <label>Maximum Participants</label>
                    <input type="number" id="participants" placeholder="e.g. 100" min="1" required>
                </div>

                <div class="form-group">
                    <label>Event Type</label>
                    <select id="event_type" onchange="togglePriceInput()" required>
                        <option value="free">Free</option>
                        <option value="paid">Paid</option>
                    </select>
                </div>

                <!-- Hidden by default, shown only if 'paid' is selected -->
                <div class="form-group" id="price_container" style="display: none;">
                    <label>Ticket Price (RM)</label>
                    <input type="number" id="price" step="0.01" placeholder="0.00">
                </div>

                <div class="form-row">
                    <button type="button" class="btn-secondary" onclick="prevStep()">Back</button>
                    <button type="submit">Submit Event</button>
                </div>
            </div>
        </form>
    </div>
</div>


<script src="{{ url_for('static', filename='create_event.js') }}"></script>

</body>
</html>
