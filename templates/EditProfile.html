<!DOCTYPE html>
<html>
    <head>
        <title>Edit Profile - UniSphere</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #fbc2eb, #a18cd1);
                display: flex;
                flex-direction: column;
                padding: 50px;
            }
            .container {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 30px;
                margin-top: 20px;
                margin-left: 40px;
            }
            .edit-profile {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 480px;
                height: 520px;
            }
            .edit-profile label {
                display: block;
                margin-top: 10px;
            }
            .edit-profile input[type="text"],
            .edit-profile input[type="email"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            .edit-profile input[type="submit"] {
                margin-top: 15px;
                padding: 10px;
                width: 100%;
                background-color: #bb00ff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .edit-profile input[type="submit"]:hover {
                background-color: #0056b3;
            }
            .edit-info {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 480px;
                height: 520px;
            }
            .popup {
                display: none;
                position: fixed;
                z-index: 1;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                overflow: auto;
                background-color: rgba(0, 0, 0, 0.5);
            }
            .popup-content {
                background-color: #fff;
                margin: 15% auto;
                padding: 20px;
                border: 1px solid #888;
                width: 300px;
                border-radius: 8px;
            }
            .close-btn {
                color: #aaa;
                float: right;
                font-size: 28px;
                font-weight: bold;
                cursor: pointer;
            }
            .close-btn:hover,
            .close-btn:focus {
                color: black;
                text-decoration: none;
                cursor: pointer;
            }
            .edit-info input[type="submit"] {
                margin-top: 15px;
                padding: 10px;
                width: 100%;
                background-color: #bb00ff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                align-items: center;
            }
            .edit-info input[type="submit"]:hover {
                background-color: #0056b3;
            }
            .edit-info input[type="password"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;
           
            }
            .edit-info input[type="email"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            
        </style>
    </head>
    <body>
        <div class="container">
            <div class="edit-profile">
                <h2>Edit Your Profile</h2>
                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" value="John Doe">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" value="JohnDoe">
                    <label for="bio">Bio:</label>
                    <input type="text" id="bio" name="bio" value="Computer Science student at UniSphere.">  
                    <label for="birthday">Birthday:</label>
                    <input type="date" id="birthday" name="birthday" value="1990-01-01">
                    <label for="faculty">Faculty:</label>
                    <input type="text" id="faculty" name="faculty" value="Faculty of Science">    
                    <label for="year-of-study">Year of Study:</label>
                    <input type="text" id="year-of-study" name="year-of-study" value="2">
                    <input type="submit" value="Update Profile">

                </form>
            </div>
            <div class="edit-info">
                <h2>Important Information</h2>
                <p>Please ensure that your profile information is accurate and up-to-date. This will help you connect with other students and access relevant resources on UniSphere.</p>
                <button onclick="openPopup('passwordPopup')" style="margin-top: 15px; padding: 10px; width: 100%; background-color: #bb00ff; color: white; border: none; border-radius: 4px; cursor: pointer;">Change Password</button>
                <button onclick="openPopup('emailPopup')" style="margin-top: 15px; padding: 10px; width: 100%; background-color: #bb00ff; color: white; border: none; border-radius: 4px; cursor: pointer;">Change Email</button>
                <div id="passwordPopup" class="popup">
                    <div class="popup-content">
                        <span class="close-btn" onclick="closePopup('passwordPopup')">&times;</span>

                        <h3>Change Password</h3>
                        <form action="/change_password" method="post">
                            <label for="current_password">Current Password:</label><br>
                            <input type="password" id="current_password" name="current_password" required><br>
                            <label for="new_password">New Password:</label><br>
                            <input type="password" id="new_password" name="new_password" required><br>
                            <label for="confirm_password">Confirm Password:</label><br>
                            <input type="password" id="confirm_password" name="confirm_password" required><br>
                            <input type="submit" value="Update Password">
                        </form>
                        <script>
                            function openPopup(id) {
                                document.getElementById(id).style.display = "block";
                                }

                            function closePopup(id) {
                                document.getElementById(id).style.display = "none";
                                }
                        </script>
                    </div>
                </div>
                <div id="emailPopup" class="popup">
                    <div class="popup-content">
                        <span class="close-btn" onclick="closePopup('emailPopup')">&times;</span>
                        <h3>Change Email</h3>
                        <form action="/change_email" method="post">
                            <label for="current_email">Current Email:</label><br>
                            <input type="email" id="current_email" name="current_email" required><br>
                            <label for="new_email">New Email:</label><br>
                            <input type="email" id="new_email" name="new_email" required><br>
                            <input type="submit" value="Update Email">
                        </form>
                        <script>
                            function openPopup(id) {
                                document.getElementById(id).style.display = "block";
                                }

                            function closePopup(id) {
                                document.getElementById(id).style.display = "none";
                                }
                        </script>

                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
