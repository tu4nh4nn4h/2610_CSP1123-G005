<!DOCTYPE html>
<html>
<head>
  <title>Event Page</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='eventregsys.css') }}">
</head>

<body>

<div class="container">

  {% if event %}
<div class="event-card">

  <h2>{{ event.name }}</h2>

  <p class="desc">
    {{ event.desc }}
  </p>

  <div class="details">
    <p><strong>Date:</strong> {{ event.date }}</p>
    <p><strong>Time:</strong> {{ event.time }}</p>
    <p><strong>Venue:</strong> {{ event.venue }}</p>
  </div>

  <a href="{{ url_for('form', event_id=event_id) }}">
    <button class="register-btn">Register</button>
  </a>

</div>
{% else %}
<p>Event not found.</p>
{% endif %}

</div>

</body>
</html>
