<!DOCTYPE html>
<html>
<head>
  <title>Event Registration Form</title>
  <link rel="stylesheet" href="eventregsys.css">
</head>

<body>

  <div class="container">

    <div class="form-card">

      <h2 id="eventTitle"></h2>

      <input type="text" id="name" placeholder="Full Name" required>

      <input type="text" id="studentId" placeholder="Student ID" required>

      <input type="email" id="studentEmail" placeholder="Student Email" required>

      <input type="email" id="personalEmail" placeholder="Personal Email" required>

      <input type="text" id="phone" placeholder="Phone Number" required>

      <input type="text" id="faculty" placeholder="Faculty / Course" required>

      <button onclick="submitRegistration()">Submit</button>

    </div>

  </div>

  <script src="event.js"></script>
</body>
</html>
