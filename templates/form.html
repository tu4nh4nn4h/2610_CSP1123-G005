<!DOCTYPE html>
<html>
  <head>
    <title>Event Registration Form</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='eventregsys.css') }}">

    <!-- POPUP CSS (INLINE) -->
    <style>
    /* BACKDROP */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* hide */
    .hidden {
      display: none;
    }

    /* MODAL BOX */
    .modal-box {
      width: 360px;
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      position: relative;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      animation: pop 0.25s ease;
    }

    /* animation */
    @keyframes pop {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* CLOSE BUTTON */
    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 20px;
      cursor: pointer;
      color: #999;
    }

    /* ICON */
    .icon-circle {
      width: 70px;
      height: 70px;
      margin: 10px auto 15px;
      border-radius: 50%;
      border: 3px solid #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #22c55e;
      font-weight: bold;
    }

    /* TEXT */
    .modal-box h2 {
      margin: 0;
      font-size: 22px;
    }

    .modal-box p {
      color: #666;
      margin: 8px 0 20px;
    }

    /* PURPLE BUTTON */
    .modal-btn {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .modal-btn:hover {
      background: #6d28d9;
    }
    
    .navbar {
      position: fixed;       /* stays at the top */
      top: 0;
      left: 0;
      width: 100%;
      background-color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
      transition: top 0.3s;
      z-index: 1000;
    }

    /* Logo styling */
    .logo a {
      font-size: 24px;
      font-weight: bold;
      color: black;
      text-decoration: none;
      padding-right: 13px;
    }

    /* Nav links container */
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    /* Individual link styling */
    .nav-links li a,
    .profile a {
      color: black;
      text-decoration: none;
      font-size: 16px;
      padding: 5px 10px;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Hover effect for links */
    .nav-links li a:hover,
    .profile a:hover {
      background-color: #f0f0f0;
      border-radius: 4px;
    }

    /* Profile link on the far right */
    .profile {
      margin-left: auto;
    }

    /* Optional: navbar appears when hovering near the top */
    body {
      padding-top: 60px; /* prevent content from hiding behind navbar */
    }

    .checkbox-group label {
  font-size: 14px;
  color: #444;
  display: flex;
  align-items: center;
  gap: 8px;
}
    </style>
  </head>

  <body>

    <nav class="navbar">
      <div class="logo">
        <a href="#">UniSphere</a>
      </div>
      <ul class="nav-links">
        <li><a href="#browse">Browse Event</a></li>
        <li><a href="#explore">Explore</a></li>
        <li><a href="#create">Create Event - Be an Organizer</a></li>
      </ul>
      <div class="profile">
        <a href="#profile">Profile</a>
      </div>
    </nav>


    <div class="container">

      <div class="form-card">

        <div class="header">
          <h2>Event Registration</h2>
          <p>Please fill in your details carefully</p>
        </div>

        <div class="checkbox-group">
  <label>
    <input type="checkbox" id="addToCalendar">
    Add this event to my Outlook Calendar
  </label>
</div>
    <form id="regForm">
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>

          <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="studentId" placeholder="e.g. 252FC" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Student Email</label>
              <input type="email" id="studentEmail" placeholder="name@student.mmu.edu.my" required>
            </div>

            <div class="form-group">
              <label>Personal Email</label>
              <input type="email" id="personalEmail" placeholder="optional">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="phone" placeholder="01X-XXXXXXX" required>
            </div>

            <div class="form-group">
              <label>Faculty</label>
              <select id="faculty" required>
                <option value="">Select faculty</option>
                <option value="FCI">FCI</option>
                <option value="FAIE">FAIE</option>
                <option value="FOM">FOM</option>
                <option value="FAC">FAC</option>
                <option value="FCM">FCM</option>
                <option value="FCA">FCA</option>
              </select>
            </div>
          </div>

          <button type="submit">Register</button>

        </form>
      </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="successModal" class="modal hidden">

      <div class="modal-box">

        <div class="close-btn" onclick="closeModal()">×</div>

        <div class="icon-circle">
          ✓
        </div>

        <h2>Successful</h2>
        <p>You have registered.</p>

        <button class="modal-btn" onclick="goBackEvent()">
          Back to Event Page
        </button>

      </div>

    </div>

    <!-- JS -->
    <script>
    function registerEventPage(eventId) {
  localStorage.setItem("eventId", eventId);
  window.location.href = "/form";
}

  form.addEventListener("submit", function (event) {
    event.preventDefault();

    const data = {
      name: document.getElementById("name").value.trim(),
      studentId: document.getElementById("studentId").value.trim(),
      studentEmail: document.getElementById("studentEmail").value.trim(),
      personalEmail: document.getElementById("personalEmail").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      faculty: document.getElementById("faculty").value
    };

    if (!data.name || !data.studentId || !data.studentEmail || !data.phone || !data.faculty) {
      return;
    }

    fetch("/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })
    .then(response => {
      if (!response.ok) throw new Error("Server error");
      return response.json();
    })
    .then(result => {

      const checkbox = document.getElementById("addToCalendar");
      let eventId = parseInt(localStorage.getItem("eventId")) || 1;

      const events = {
        1: {
          title: "Tech Talk 2026",
          desc: "Learn about AI trends",
          location: "Main Hall",
          start: "20260520T100000",
          end: "20260520T120000"
        },
        2: {
          title: "Sports Day",
          desc: "Annual university sports event",
          location: "Stadium",
          start: "20260525T080000",
          end: "20260525T120000"
        },
        3: {
          title: "Hackathon 2026",
          desc: "Build innovative projects",
          location: "Lab 1",
          start: "20260601T090000",
          end: "20260601T180000"
        },
        4: {
          title: "MMU Fun Run 2026",
          desc: "Run for fun and fitness",
          location: "Campus Park",
          start: "20260610T070000",
          end: "20260610T100000"
        }
      };

      // ================= OUTLOOK ICS =================
      if (checkbox && checkbox.checked && events[eventId]) {

        const e = events[eventId];

        const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${e.title}
DESCRIPTION:${e.desc}
LOCATION:${e.location}
DTSTART:${e.start}
DTEND:${e.end}
END:VEVENT
END:VCALENDAR`;

        const blob = new Blob([icsContent], { type: "text/calendar" });
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `${e.title}.ics`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      // ================= SUCCESS UI =================
      document.getElementById("successModal").classList.remove("hidden");

      setTimeout(() => {
        window.location.href = `/event/${eventId}`;
      }, 800);

    })
    .catch(error => {
      console.error("Registration error:", error);
    });
  });
});
    </script>

    <script src="{{ url_for('static', filename='event.js') }}"></script>

  </body>
</html>
