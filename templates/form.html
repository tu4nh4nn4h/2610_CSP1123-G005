<!DOCTYPE html>
<html>
<head>
<title>Event Registration Form</title>
<link rel="stylesheet" href="{{ url_for('static', filename='eventregsys.css') }}"></head> <body>
<div class="container">

  <div class="form-card">

    <div class="header">
      <h2>Event Registration</h2>
      <p>Please fill in your details carefully</p>
    </div>

    <form id="regForm">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. 12345678" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Student Email</label>
          <input type="email" id="studentEmail" placeholder="name@student.mmu.edu.my" required>
        </div>

        <div class="form-group">
          <label>Personal Email</label>
          <input type="email" id="personalEmail" placeholder="optional">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="01X-XXXXXXX" required>
        </div>

        <div class="form-group">
          <label>Faculty</label>
          <select id="faculty" required>
            <option value="">Select faculty</option>
            <option value="FCI">FCI</option>
            <option value="FAIE">FAIE</option>
            <option value="FOM">FOM</option>
            <option value="FAC">FAC</option>
            <option value="FCM">FCM</option>
            <option value="FCA">FCA</option>
          </select>
        </div>
      </div>
<!-- success popup -->
<button type="submit" id="registerBtn">Register</button>
    </form>
  </div>
<div id="successModal" class="modal">
  <div class="modal-content">
    <p>Registration successful!</p>
    <button onclick="backToEvent()">Back to event</button>
  </div>
</div>
<!-- cancel confirmation popup -->
<div id="cancelModal" class="modal">
  <div class="modal-content">
    <p>Are you sure you want to cancel your registration?</p>

    <button onclick="confirmCancel()">Yes</button>
    <button onclick="closeCancel()" class="noBtn">No</button>
  </div>
</div>
</div>
