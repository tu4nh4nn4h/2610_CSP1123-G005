<!DOCTYPE html>
<html>
<head>
  <title>Event Registration Form</title>
  <link rel="stylesheet" href="eventregsys.css">
</head>

<body>

  <div class="container">

    <div class="form-card">

      <h2 id="eventTitle">Event Registration</h2>

      <form onsubmit="submitRegistration(); return false;">

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>

        <label>Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. 12345678" required>

        <label>Student Email</label>
        <input type="email" id="studentEmail" placeholder="name@student.mmu.edu.my" required>

        <label>Personal Email</label>
        <input type="email" id="personalEmail" placeholder="your personal email (optional)">

        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="01X-XXXXXXX" required>

        <label>Faculty</label>
        <select id="faculty" required>
          <option value="">-- Select Faculty --</option>
          <option value="FCI">FCI</option>
          <option value="FAIE">FAIE</option>
          <option value="FOM">FOM</option>
          <option value="FAC">FAC</option>
          <option value="FCM">FCM</option>
          <option value="FCA">FCA</option>
        </select>

        <button type="submit">Submit Registration</button>

      </form>

    </div>

  </div>

  <script src="event.js"></script>
</body>
</html>
