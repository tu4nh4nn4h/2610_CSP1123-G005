<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSphere - Cancel Registration</title>

    <style>
            /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }

            /* MATCH eventregsys.css BACKGROUND */
            body {
        height: 100vh;
        background: linear-gradient(to right, #fbc2eb, #a18cd1);
        display: flex;
        flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            background-color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid #ddd;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: black;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a,
        .profile {
            text-decoration: none;
            color: black;
            font-size: 15px;
        }

        /* CENTER CONTENT */
        .hero-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* EVENT CARD */
        .event-card {
            width: 380px;
            background: #e9e7ef;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* TEXT */
        .event-card h1 {
            margin-bottom: 10px;
            font-size: 28px;
            color: black;
        }

        .description {
            color: #555;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* DETAILS */
        .details p {
            margin: 8px 0;
            color: black;
        }

        /* BUTTON */
        .cancel-btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: black;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cancel-btn:hover {
            background: #333;
        }

        /* MOBILE */
        @media (max-width: 500px) {
            .event-card {
                width: 90%;
                padding: 25px;
            }

            .navbar {
                padding: 12px 20px;
            }

            nav {
                gap: 10px;
            }

            nav a {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">UniSphere</div>

        <nav>
            <a href="#">Browse Event</a>
            <a href="#">Create Event</a>
        </nav>

        <div class="profile">Profile</div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="hero-section">

        <div class="event-card">

            <h1>Food Festival 2026</h1>

            <p class="description">
                Explore global cuisines and enjoy fun activities.
            </p>

            <div class="details">
                <p><strong>Date:</strong> 25 May 2026</p>
                <p><strong>Time:</strong> 10:00 AM - 10:00 PM</p>
                <p><strong>Venue:</strong> Central Plaza, MMU Cyberjaya</p>
            </div>

            <button class="cancel-btn">
                Cancel my registration
            </button>

        </div>

    </main>

</body>
</html>
