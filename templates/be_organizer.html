<!DOCTYPE html>
<html>
    <head>
        <title>Be an Organizer</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #fbc2eb, #a18cd1);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .userToOrganizer-form {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 400px;
                margin-left: 70px;
                
            }
            .userToOrganizer-form label {
                display: block;
                margin-top: 10px;
            }
            .userToOrganizer-form input[type="text"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;

            }
            .button {
                 margin-top: 15px;
                margin-top: 15px;
                padding: 10px;
                width: 100%;
                background-color: #bb00ff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .button:hover {
                background-color: #0056b3;
            }
            .header {
                text-align: center;
                margin-bottom: 20px;
            }

            .navbar {
                position: fixed;       /* stays at the top */
                top: 0;
                left: 0;
                width: 100%;
                background-color: white;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 20px;
                border-bottom: 1px solid #ddd;
                transition: top 0.3s;
                z-index: 1000;
            }

            /* Logo styling */
            .logo a {
                font-size: 24px;
                font-weight: bold;
                color: black;
                text-decoration: none;
                padding-right: 13px;
            }

            /* Nav links container */
            .nav-links {
                list-style: none;
                display: flex;
                gap: 20px;
            }

            /* Individual link styling */
            .nav-links li a,
            .profile a {
                color: black;
                text-decoration: none;
                font-size: 16px;
                padding: 5px 10px;
                transition: background-color 0.3s, color 0.3s;
            }

            /* Hover effect for links */
            .nav-links li a:hover,
            .profile a:hover {
                background-color: #f0f0f0;
                border-radius: 4px;
            }

            /* Profile link on the far right */
            .profile {
                margin-left: auto;
            }
        </style>
        <div class="header">
            <h1>Become an Organizer</h1>
            <h2>Join the community and create amazing events!</h2>
        </div>
    </head>
    <body>

        <nav class="navbar">
            <div class="logo">
                <a href="#">UniSphere</a>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('eventbrowsing') }}">Browse Event</a></li>
                <li><a href="{{ url_for('create_event') }}">Create Event - Be an Organizer</a></li>
            </ul>
            <div class="profile">
                <a href="{{ url_for('dashboard') }}">Profile</a>
            </div>
        </nav>

        <div class="userToOrganizer-form">
            <div id="becomeOrganizerForm">
                <form id="becomeOrganizerForm" action="/be_organizer" method="post">
                    <label for="Club_body">Club / Body</label>
                    <input type="text" id="Club_body" name="Club_body" required><br>

                    <label for="Position_title">Position Title</label>
                    <input type="text" id="Position_title" name="Position_title" required><br>

                    <button type="button" onclick="becomeOrganizer()" class="button">Become Organizer</button>
                </form>
            </div>
        </div>
        <script>
            function becomeOrganizer() {
                fetch('/be_organizer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        club_body: document.getElementById('Club_body').value,
                        position_title: document.getElementById('Position_title').value
                    })
                })
                .then(res => res.text())  // plain text response from Flask
                .then(message => {
                    alert(message);  // show the message returned by Flask

                    if (message === "Success") {
                        // Redirect organizer to create event page
                        window.location.href = "/createevent";
                    }
                })
                .catch(error => {
                    console.error(error);
                    alert("Something went wrong.");
                });
            }
            </script>
    </body>
</html>
