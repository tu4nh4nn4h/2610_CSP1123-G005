<!DOCTYPE html>
<html>
     <head>
        <title>UniSphere</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #fbc2eb, #a18cd1);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .login-form {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 400px;
                margin-left: 40px;
            }
            .login-form label {
                display: block;
                margin-top: 10px;
            }
            .login-form input[type="text"],
            .login-form input[type="password"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            .login-form input[type="submit"] {
                margin-top: 15px;
                padding: 10px;
                width: 100%;
                background-color: #bb00ff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .login-form input[type="submit"]:hover {
                background-color: #0056b3;
            }
            .header {
                 text-align: center;
                 margin-bottom: 20px;
            }
            .popup {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                justify-content: center;
                align-items: center;
            }
            .popup-content {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                text-align: center;
            }
        </style>
        <div class="header">
            <h1>UniSphere</h1>
            <h2>Enter your credentials to use all of sites features</h2>
        </div>
     </head>
     <body>
        <div class="login-form">
            <h2 style="text-align: center;">Welcome Back!</h2>
            <label for ="username">Username:</label><br>
            <input type="text" id="username" name="username"><br>
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password"><br>
            <input type="submit" value="Log In">
            <p style="text-align: center;">Don't have an account?<a href="#" onclick="showPopup()">Register here</a></p>
            <div id="popup" class="popup">
                <div class="popup-content">
                    <span style="float: right; cursor: pointer;" onclick="hidePopup()">&times;</span>
                    <h2>Sign Up as:</h2>
                    <button onclick="document.location.href='register.html'">Student</button>
                    <button onclick="document.location.href='register_organizer.html'">Event Organizer</button>
                </div>
                <script>
                    function showPopup() {
                        var popup = document.getElementById("popup");
                        popup.style.display = "block";
                        popup.classList.toggle("show");
                    }
                    function hidePopup() {
                        var popup = document.getElementById("popup");
                        popup.style.display = "none";
                    }
                </script>
            
        </div>
     </body>
</html>
