<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Organizer - My Event</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Poppins', sans-serif;
            }

            body {
                /* Gradient background matching the image */
                background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
                padding-top: 60px; /* prevent content from hiding behind navbar */
            }

            .dashboard {
                width: 95%;
                max-width: 1400px;
                padding: 40px;
                border-radius: 25px;
                /* Semi-transparent overlay to let the background peak through slightly */
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(10px);
                color: white;
            }

            .welcome {
                font-size: 1.2rem;
                margin-bottom: 5px;
            }

            .title {
                font-size: 3.5rem;
                font-weight: 700;
                margin-bottom: 30px;
                text-transform: uppercase;
            }

            /* Fixed Global Navigation Navbar Layer */
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 70px;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(8px);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 40px;
                z-index: 1000;
            }

            .navbar-brand {
                font-size: 1.5rem;
                font-weight: 700;
                color: #3f1b57;
                text-decoration: none;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            /* Core application navigation action links */
            .navbar-links {
                display: flex;
                gap: 25px;
                align-items: center;
            }

            .navbar-links a {
                color: #5c3576;
                text-decoration: none;
                font-size: 0.95rem;
                font-weight: 500;
                transition: color 0.2s;
                position: relative;
                padding: 4px 0;
            }

            .navbar-links a:hover {
                color: #7b2cbf;
            }

            /* Underline slider effect matching system application pages */
            .navbar-links a::after {
                content: '';
                position: absolute;
                width: 0;
                height: 2px;
                bottom: 0;
                left: 0;
                background-color: #7b2cbf;
                transition: width 0.2s ease;
            }

            .navbar-links a:hover::after {
                width: 100%;
            }
        </style>
    </head>
    <body>

        <nav class="navbar">
            <a class="navbar-brand" href="/dashboard">UniSphere</a>
            <div class="navbar-links">
                <a href="/eventbrowsing">Browse Events</a>
                <a href="/createevent">Create Event</a>
                <a href="/manageevent">My Event</a>
                <a href="/user_dashboard1">Profile</a>
            </div>
        </nav>

        <div class="dashboard">
            <h1 class="title">My Event</h1>
            <p class="welcome">Organizer event management</p>

            <div class="events-container">
                {% for event in events %}
                <a href="{{ url_for('manage_event', event_id=event['event_id']) }}"class="event-card">
                    <img src="{{ url_for('static',filename='eventPoster/' + event['event_poster']) }}">
                    <h3>{{ event['event_name'] }}</h3>
                    <p>{{ event['start_date'] }}</p>
                </a>
                {% endfor %}
            </div>
        </div>
    </body>
</html>
