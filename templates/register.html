<!DOCTYPE html>
<html>
    <head>
        <title>Register - UniSphere</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #fbc2eb, #a18cd1);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .registration-form {
                background-color: #fff;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                width: 400px;
                margin-left: 70px;
                
            }
            .registration-form label {
                display: block;
                margin-top: 10px;
            }
            .registration-form input[type="text"],
            .registration-form input[type="email"],
            .registration-form input[type="password"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;

            }
            .button {
                 margin-top: 15px;
                margin-top: 15px;
                padding: 10px;
                width: 100%;
                background-color: #bb00ff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .button:hover {
                background-color: #0056b3;
            }
            .header {
                text-align: center;
                margin-bottom: 20px;
            }
        </style>
        <div class="header">
            <h1>Create Your Account</h1>
            <h2>Join the community and start exploring!</h2>
        </div>
    </head>
    <body>
        <div class="registration-form">
            <div id="registerForm">
                <label for="Name">Full Name:</label>
                <input type="text" id="Name" name="Name"><br>

                <label for="Email">Student Email:</label>
                <input type="email" id="Email" name="Email"><br>
                
                <label for="Username">Username: </label>
                <input type="text" id="Username" name="Username"><br>

                <label for="Student_id">Student ID:</label>
                <input type="text" id="Student_id" name="Student_id"><br>

                <label for="Password">Password: </label>
                <input type="password" id="Password" name="Password"><br>

                <Label for="confirmPassword">Confirm Password: </Label>
                <input type="password" id="confirmPassword" name="confirmPassword"><br>

                <button onclick="register()" class="button">Register</button>
            </div>
            <div id="otpForm" style="display:none;">
                <h3 style="text-align: center;">Verify Your Email</h3>
                <input type="text" id="otp" placeholder="Enter OTP"><br>
                <button onclick="verifyOTP()">Verify OTP</button>
                <button onclick="resendOTP()">Resend OTP</button>
            
            </div>
            <script>
            let userEmail = "";

            function register() {
                userEmail = document.getElementById("email").value;

                fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        email: userEmail,
                        username: document.getElementById("username").value,
                        student_id: document.getElementById("student_id").value,
                        password: document.getElementById("password").value
                    })
                })
                .then(res => res.json())
                .then(data => {
                    alert("OTP sent! Check terminal for now");

                    document.getElementById("registerForm").classList.add("hidden");
                    document.getElementById("otpForm").classList.remove("hidden");
                });
            }

            function verifyOTP() {
                let otp = document.getElementById("otp").value;

                fetch('/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp: otp })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "verified") {
                        alert("Account verified!");
                    } else {
                        alert("Invalid OTP");
                    }
                });
            }

            function resendOTP() {
                fetch('/resend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                })
                .then(res => res.json())
                .then(data => {
                    alert("New OTP sent!");
                });
            }
            </script>
        </div>
    </body>
</html>
