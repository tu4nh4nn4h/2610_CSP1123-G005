<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Event Browsing</title>

    
    <link rel="stylesheet" href="{{ url_for('static', filename='eventdisbrow.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>

    <nav class="navbar">
        <a class="navbar-brand" href="/dashboard">UniSphere</a>
        <div class="navbar-links">
            <a href="/eventbrowsing">Browse Events</a>
            <a href="/createevent">Create Event</a>
            <a href="/user_dashboard1">Profile</a>
        </div>
    </nav>

    <div class="container">
      <h1 class="title">Browse Events</h1>

      <div class="event-grid">
           {% for event in events %}
            <div class="event-card">
                <h3>{{ event['event_name'] }}</h3>
                <p>{{ event['event_description'][:120] }}...</p>
                <p><strong>Location:</strong> {{ event['main_location'] }}</p>
                <a href="{{ url_for('event_detail', event_id=event['event_id']) }}" class="btn">View Details</a>
           </div>
    {% endfor %}
      </div></div>
  </body>
</html>
