<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - UniSphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Unified central layout wrapper system */
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
        }

        .forgot-password-form {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            width: 100%;
            position: relative; /* Position context for back arrow alignment */
        }

        /* Navigational Return Arrow style wrapper */
        .back-nav {
            position: absolute;
            top: 25px;
            left: 25px;
        }

        .back-nav a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #f3ebf7;
            border-radius: 50%;
            color: #7b2cbf;
            transition: background-color 0.2s, transform 0.1s;
        }

        .back-nav a:hover {
            background-color: #e2d4ea;
            transform: translateX(-2px);
        }

        .forgot-password-form h2 {
            color: #3f1b57;
            font-weight: 700;
            margin-bottom: 25px;
            margin-top: 10px; /* Space clear of the absolute top arrow button */
        }

        .form-group {
            margin-bottom: 18px;
        }

        .forgot-password-form label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        .forgot-password-form input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            color: #333;
        }

        .forgot-password-form input[type="password"]:focus {
            border-color: #b37cd4;
            box-shadow: 0 0 0 3px rgba(179, 124, 212, 0.25);
        }

        .forgot-password-form input[type="submit"] {
            margin-top: 10px;
            padding: 14px;
            width: 100%;
            background-color: #b37cd4;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .forgot-password-form input[type="submit"]:hover {
            background-color: #9c5ec2;
        }

        .forgot-password-form input[type="submit"]:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="forgot-password-form">
            
            <div class="back-nav">
                <a href="/edit_profile" title="Cancel and return to Edit Profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
            </div>

            <h2 style="text-align: center;">Reset Password</h2>
            
            <form action="/reset_password" method="post" onsubmit="return validatePasswords(event)">
                <div class="form-group">
                    <label for="NewPassword">New Password:</label>
                    <input type="password" id="NewPassword" name="NewPassword" required>
                </div>
                
                <div class="form-group">
                    <label for="ConfirmNewPassword">Confirm Password:</label>
                    <input type="password" id="ConfirmNewPassword" name="ConfirmNewPassword" required>
                </div>
                
                <input type="submit" value="Reset Password">
            </form>
        </div>
    </div>

    <script>
        function validatePasswords(event) {
            const newPassword = document.getElementById("NewPassword").value;
            const confirmPassword = document.getElementById("ConfirmNewPassword").value;

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match! Please check your input fields and try again.");
                event.preventDefault(); // Halt active form submission
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
