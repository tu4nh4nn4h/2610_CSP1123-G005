<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #fbc2eb, #a18cd1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .forgot-password-form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }
        .forgot-password-form label {
            display: block;
            margin-top: 10px;
        }
        .forgot-password-form input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .forgot-password-form input[type="submit"] {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background-color: #bb00ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .forgot-password-form input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="forgot-password-form">
        <h2 style="text-align: center;">Reset Password</h2>
        <form action="/reset_password" method="post">
            <label for="NewPassword">New Password:</label><br>
            <input type="password" id="NewPassword" name="NewPassword" required><br>
            <label for="ConfirmNewPassword">Confirm Password:</label><br>
            <input type="password" id="ConfirmNewPassword" name="ConfirmNewPassword" required><br>
            <input type="submit" value="Reset Password">
        </form>
    </div>
</body>
</html>
