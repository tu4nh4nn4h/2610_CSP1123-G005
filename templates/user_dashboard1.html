<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>User Dashboard - UniSphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Gradient background matching the image */
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            width: 95%;
            max-width: 1400px;
            padding: 40px;
            border-radius: 25px;
            /* Semi-transparent overlay to let the background peak through slightly */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
        }

        .welcome {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            gap: 25px;
        }

        .card {
            background: rgba(176, 106, 214, 0.4);
            border-radius: 40px;
            padding: 30px;
            min-height: 280px;
        }

        /* Profile Card Styles */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-icon {
            width: 120px;
            height: 120px;
            border: 4px solid white;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        /* Drawing the head and shoulders in CSS */
        .profile-icon::before {
            content: "";
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .profile-icon::after {
            content: "";
            position: absolute;
            width: 80px;
            height: 40px;
            background: white;
            border-radius: 40px 40px 0 0;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .profile-content p {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        /* Calendar Card Styles */
        .calendar-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-info .day { font-size: 1.2rem; }
        .date-info .date { font-size: 3rem; font-weight: 700; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            width: 200px;
            height: 120px;
        }

        .calendar-grid div {
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Events Card Styles */
        .event-row {
            margin-bottom: 20px;
        }

        .event-label {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .circles {
            display: flex;
            gap: 15px;
        }

        .circle {
            width: 70px;
            height: 70px;
            background: #7a1fa2; /* Darker purple like image */
            border-radius: 50%;
        }

        .scroll-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin-top: 20px;
        }

        .scroll-fill {
            width: 40%;
            height: 100%;
            background: #e0f2f1;
            border-radius: 10px;
        }

        /* Inbox Card Styles */
        .inbox-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .clickable-card {
            text-decoration: none; /* Removes underline */
            color: inherit;        /* Keeps text white/original color */
            display: flex;         /* Maintains your original layout */
            cursor: pointer;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        .clickable-card:hover {
            transform: translateY(-5px); /* Lift effect on hover */
            background: rgba(176, 106, 214, 0.6); /* Slightly darker on hover */
        }

        .clickable-card:active {
            transform: translateY(0); /* "Press" effect when clicked */
        }

        /* Responsive Fix */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            .title { font-size: 2.5rem; }
        }

        .navbar {
            position: fixed;       /* stays at the top */
            top: 0;
            left: 0;
            width: 100%;
            background-color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
            transition: top 0.3s;
            z-index: 1000;
            }

            /* Logo styling */
        .logo a {
            font-size: 24px;
            font-weight: bold;
            color: black;
            text-decoration: none;
            padding-right: 13px;
            }

            /* Nav links container */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            }

            /* Individual link styling */
        .nav-links li a,
        .nav-profile a {
            color: black;
            text-decoration: none;
            font-size: 16px;
            padding: 5px 10px;
            transition: background-color 0.3s, color 0.3s;
            }

            /* Hover effect for links */
        .nav-links li a:hover,
        .nav-profile a:hover {
            background-color: #f0f0f0;
            border-radius: 4px;
            }

            /* Profile link on the far right */
        .nav-profile {
            margin-left: auto;
            }

            /* Optional: navbar appears when hovering near the top */
        body {
            padding-top: 60px; /* prevent content from hiding behind navbar */
            }



        
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="#">UniSphere</a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('eventbrowsing') }}">Browse Event</a></li>
            <li><a href="{{ url_for('create_event') }}">Create Event - Be an Organizer</a></li>
        </ul>
        <div class="nav-profile">
            <a href="#profile">Profile</a>
        </div>
    </nav>

    <div class="dashboard">
        <p class="welcome">Welcome back, user!</p>
        <h1 class="title">User Dashboard</h1>

        <div class="grid">
            <a href="{{ url_for('user_profile') }}" class =" card profile-card clickable-card">
                <!-- <div class="card profile-card"> -->
                <div class="profile-icon"></div>
                <div class="profile-content">
                    <p><b>Name :</b> {{ user['name'] }}</p>
                    <p><b>Username :</b> {{ user['username'] }}</p>
                    <p><b>Contact Details :</b> {{ user['email'] }}</p>
                    <!-- </div> -->
                </div>
            </a>

            <div class="card calendar-card">
                <div class="date-info">
                    <p class="day">DAY</p>
                    <p class="date">DATE</p>
                </div>
                <div class="calendar-grid">
                    <div></div><div></div><div></div><div></div><div></div><div></div>
                    <div></div><div></div><div></div><div></div><div></div><div></div>
                    <div></div><div></div><div></div><div></div><div></div><div></div>
                    <div></div><div></div><div></div><div></div><div></div><div></div>
                </div>
            </div>

            <div class="card event-card">
                <div class="event-row">
                    <p class="event-label">Upcoming event :</p>
                    <div class="circles">
                        <div class="circle" onclick="openCancel(1)"></div>
                        <div class="circle" onclick="openCancel(2)"></div>
                    </div>
                </div>
                <div class="event-row">
                    <p class="event-label">Joined event :</p>
                    <div class="circles">
                        <div class="circle"></div>
                        <div class="circle"></div>
                        <div class="circle"></div>
                        <div class="circle"></div>
                    </div>
                </div>
                <div class="scroll-bar">
                    <div class="scroll-fill"></div>
                </div>
            </div>

            <div class="card inbox-card">
                <h2 class="inbox-title">Inbox</h2>
            </div>
        </div>
    </div>

<script>
function openCancel(eventId) {
    window.location.href = "/cancel_event/" + eventId;
}
</script>

</body>
</html>
